[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = mcp-server/src
markers =
    integration: requires Qdrant and Neo4j (Docker or existing services)
    environment: plugin structure, scripts, and live environment checks
filterwarnings =
    ignore::pytest.PytestDeprecationWarning:pytest_asyncio.plugin