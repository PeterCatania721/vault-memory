# vault-memory configuration (Neo4j-only: graph + vector embeddings)
# Copy to ~/.vault-memory/config.yaml or set VAULT_MEMORY_CONFIG to your path.

vault:
  path: ~/Documents/Obsidian/MyVault
  ignore:
    - ".obsidian/**"
    - ".trash/**"
    - "templates/**"

vector:
  enabled: true
  provider: neo4j
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  chunk_size: 800
  chunk_overlap: 100

graph:
  enabled: true
  provider: neo4j
  uri: bolt://127.0.0.1:7687
  user: neo4j
  password: vaultmemory
  database: neo4j

sync:
  wikilinks: true
  incremental: true

docker:
  mode: unified

curator:
  enabled: true
  interval_hours: 168
  stale_after_days: 30
  archive_after_days: 90
  compress_after_days: 60
  compress_min_words: 800
  compress_max_chars: 12000
  protect_paths:
    - "playbooks/**"
    - "tests/success/**"
    - "**/test-recipe*.md"
    - "Memory/Agent/Solutions/**"
    - "Memory/Agent/Anti-Patterns/**"
  protect_tags:
    - pinned
    - test-success
    - playbook
    - replicable