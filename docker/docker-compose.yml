# vault-memory — Neo4j-only stack (graph + vector embeddings)
# Usage: docker compose -f docker/docker-compose.yml up -d

name: vault-memory

services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: vault-memory-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-vaultmemory}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  neo4j_data:
    external: true
    name: vault-memory-neo4j-data