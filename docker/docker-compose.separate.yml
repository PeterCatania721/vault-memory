# vault-memory — Neo4j standalone compose project
# Usage: docker compose -f docker-compose.separate.yml --profile graph up -d

services:
  neo4j:
    image: neo4j:5.26.0-community
    profiles: ["graph"]
    container_name: vault-memory-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-vaultmemory}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
    external: true
    name: vault-memory-neo4j-data