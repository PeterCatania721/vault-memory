# vault-memory — run each DB in its own compose project (isolated updates/restarts)
# Usage:
#   docker compose -f docker-compose.separate.yml --profile vector up -d
#   docker compose -f docker-compose.separate.yml --profile graph up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["vector"]
    container_name: vault-memory-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0-community
    profiles: ["graph"]
    container_name: vault-memory-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-vaultmemory}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data: